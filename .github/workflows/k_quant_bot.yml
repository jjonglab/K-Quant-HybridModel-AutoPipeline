name: K-Quant Auto Pipeline

on:
  schedule:
    # 매일 한국 시간 새벽 2시 (UTC 17시)에 자동 실행
    - cron: '0 17 * * *'
  workflow_dispatch: # 💡 언제든 내가 원할 때 '수동 실행' 할 수 있는 버튼 활성화

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # 로봇이 사용할 운영체제 (리눅스)

    steps:
    - name: 📥 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 🐍 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache : 'pip'

    - name: 📦 3. 필수 패키지 한 번에 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🏭 4. K-Quant 팩토리 가동 (데이터 수집 & AI RAG)
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        TIDB_HOST: ${{ secrets.TIDB_HOST }}
        TIDB_USER: ${{ secrets.TIDB_USER }}
        TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
      run: python k_quant_factory.py

    - name: 📈 5. K-Quant 백테스트 엔진 가동
      env:
        TIDB_HOST: ${{ secrets.TIDB_HOST }}
        TIDB_USER: ${{ secrets.TIDB_USER }}
        TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
      run: python k_quant_backtest.py
